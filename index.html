<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rayi | Afganzett</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(-45deg,#000,#111,#222,#444);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:25px;
    width:350px;
    color:white;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.foto{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    animation:putar 5s linear infinite;
}

@keyframes putar{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

h1{
    margin-top:15px;
}

.typing{
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid white;
    width:0;
    margin:auto;
    animation:ketik 4s steps(30,end) forwards;
}

@keyframes ketik{
    from{width:0;}
    to{width:100%;}
}

.btn{
    display:block;
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:.3s;
}

.ig{
    background:#E1306C;
}

.tt{
    background:black;
    border:1px solid white;
}

.btn:hover{
    transform:scale(1.05);
}

footer{
    margin-top:20px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="card">

    <!-- Ganti rayi.jpg dengan nama foto kamu -->
    <img src="rayi.jpg" class="foto">

    <h1>👋 Hallo Guys!</h1>

    <p class="typing">
        Welcome To My Website </p>

    <br>

    <h2>follow my media social media account @afganzett</h2>

    <a href="https://instagram.com/afganzett"
       target="_blank"
       class="btn ig">
       📸 Follow Instagram
    </a>

    <a href="https://www.tiktok.com/@afganzettt?_r=1&_t=ZS-97LkiN1XPQl"
       target="_blank"
       class="btn tt">
       🎵 Follow TikTok
    </a>

    <footer>
        Terima kasih sudah berkunjung 🚀
    </footer>

</div>

</body>
</html>
